name: ci

on:
  push:
  pull_request:

jobs:
  moon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check
        run: moon check
      - name: Test
        run: moon test
      - name: Demo
        run: moon run cmd/demo
